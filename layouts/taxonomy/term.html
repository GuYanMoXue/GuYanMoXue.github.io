{{ define "main" }}
<div class="taxonomy-term">
  <h1>{{ .Title }}</h1>
  <div class="posts">
    {{ range .Pages }}
    <article class="post-card">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <div class="post-meta">
        <time>{{ .Date.Format "2006-01-02" }}</time>
      </div>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
