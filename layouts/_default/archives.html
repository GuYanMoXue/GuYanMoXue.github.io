{{ define "main" }}
<div class="archives">
  <h1>{{ .Title }}</h1>
  {{ range (where .Site.RegularPages "Section" "posts").GroupByDate "2006" }}
  <div class="archive-group">
    <h2>{{ .Key }}</h2>
    {{ range .Pages }}
    <div class="archive-item">
      <time>{{ .Date.Format "01-02" }}</time>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </div>
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
