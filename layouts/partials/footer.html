<footer class="site-footer">
  <div class="container">
    <p>{{ .Site.Params.footerText }}</p>
    <div class="footer-links">
      {{ with .Site.Params.social.email }}<a href="mailto:{{ . }}">Email</a>{{ end }}
      {{ with .Site.Params.social.github }}<a href="https://github.com/{{ . }}" target="_blank">GitHub</a>{{ end }}
    </div>
  </div>
</footer>
